services:
  - type: web
    name: stock-market-relationship-backend
    env: node
    rootDir: backend
    buildCommand: npm install --include=dev && npm run prisma:generate
    startCommand: npm run start:with-migrate
    plan: free
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: stock-market-relationship-db
          property: connectionString
      - key: CLIENT_URL
        sync: false
      - key: RENDER_RUN_SEED_ON_DEPLOY
        value: "false"

databases:
  - name: stock-market-relationship-db
    databaseName: stock_relationship
    plan: free
